<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0d10;
  --surface: #141519;
  --surface-raised: #1a1b21;
  --surface-hover: #1f2028;
  --border: #2a2b33;
  --border-subtle: #1e1f27;
  --text: #e8e9ed;
  --text-secondary: #8b8d98;
  --text-muted: #5c5e6a;
  --accent: #1863DC;
  --accent-bright: #3b82f6;
  --accent-glow: rgba(24, 99, 220, 0.15);
  --accent-glow-strong: rgba(24, 99, 220, 0.3);
  --success: #22c55e;
  --error: #ef4444;
  --warning: #f59e0b;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
}

html { font-size: 15px; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  position: relative;
  overflow-x: hidden;
}

/* Film grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* Ambient glow */
.ambient-glow {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  top: -200px;
  right: -100px;
  pointer-events: none;
  z-index: 0;
  animation: drift 20s ease-in-out infinite alternate;
}

@keyframes drift {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(-80px, 60px) scale(1.15); }
}

/* Layout */
.shell {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

/* Header */
header {
  padding: 48px 0 40px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-subtle);
}

header h1 {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 2.6rem;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--text);
}

header h1 span {
  color: var(--accent-bright);
}

.health-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  color: var(--text-muted);
  padding: 6px 14px;
  border-radius: 100px;
  border: 1px solid var(--border-subtle);
  background: var(--surface);
  transition: all 0.3s ease;
}

.health-badge[data-status="ok"] {
  color: var(--success);
  border-color: rgba(34, 197, 94, 0.2);
}

.health-badge[data-status="error"] {
  color: var(--error);
  border-color: rgba(239, 68, 68, 0.2);
}

.health-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background 0.3s ease;
}

.health-badge[data-status="ok"] .health-dot {
  background: var(--success);
  box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
}

.health-badge[data-status="error"] .health-dot {
  background: var(--error);
}

/* Sections */
main {
  padding: 40px 0 80px;
  display: grid;
  gap: 28px;
}

.row-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}

@media (max-width: 768px) {
  .row-2 { grid-template-columns: 1fr; }
}

.card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 28px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-glow-strong), transparent);
  opacity: 0;
  transition: opacity 0.4s ease;
}

.card:hover::before { opacity: 1; }

.card-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-label svg {
  width: 14px;
  height: 14px;
  opacity: 0.5;
}

/* Upload area */
.drop-zone {
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 36px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  background: transparent;
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.drop-zone.dragover {
  transform: scale(1.01);
}

.drop-zone-icon {
  width: 40px;
  height: 40px;
  margin: 0 auto 12px;
  border-radius: 10px;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
}

.drop-zone:hover .drop-zone-icon {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.drop-zone-icon svg {
  width: 18px;
  height: 18px;
  color: var(--text-secondary);
}

.drop-zone p {
  font-size: 0.87rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

.drop-zone p strong {
  color: var(--accent-bright);
  font-weight: 500;
}

.drop-zone input[type="file"] {
  display: none;
}

/* Upload status */
.upload-status {
  margin-top: 16px;
  display: none;
}

.upload-status.active { display: block; }

.upload-file-name {
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.upload-file-name svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.progress-track {
  width: 100%;
  height: 4px;
  background: var(--surface-raised);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  width: 0%;
  transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

.progress-fill.complete { background: var(--success); }
.progress-fill.error { background: var(--error); }

.status-text {
  font-size: 0.78rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.status-text .tag {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.72rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.tag-pending { background: rgba(245, 158, 11, 0.12); color: var(--warning); }
.tag-processing { background: var(--accent-glow); color: var(--accent-bright); }
.tag-completed { background: rgba(34, 197, 94, 0.1); color: var(--success); }
.tag-error { background: rgba(239, 68, 68, 0.1); color: var(--error); }

/* Download card */
.download-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 0;
  text-align: center;
  min-height: 180px;
}

.download-icon-wrap {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  background: var(--accent-glow);
  border: 1px solid rgba(24, 99, 220, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}

.download-icon-wrap svg {
  width: 24px;
  height: 24px;
  color: var(--accent-bright);
}

.download-content p {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 20px;
  line-height: 1.5;
}

/* Buttons */
.btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  padding: 10px 22px;
  border-radius: var(--radius-xs);
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn svg { width: 15px; height: 15px; }

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover {
  background: var(--accent-bright);
  box-shadow: 0 4px 20px rgba(24, 99, 220, 0.3);
  transform: translateY(-1px);
}

.btn-primary:active { transform: translateY(0); }

.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-ghost:hover {
  color: var(--text);
  border-color: var(--text-muted);
  background: var(--surface-raised);
}

/* Query form */
.query-form {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 12px;
  align-items: end;
}

@media (max-width: 768px) {
  .query-form { grid-template-columns: 1fr 1fr; }
}

.field label {
  display: block;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

.field input, .field select {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.87rem;
  width: 100%;
  padding: 9px 14px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  background: var(--surface-raised);
  color: var(--text);
  outline: none;
  transition: all 0.2s ease;
}

.field input::placeholder {
  color: var(--text-muted);
}

.field input:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* Results */
.results-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 20px;
  margin-bottom: 12px;
  min-height: 32px;
}

.results-count {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.results-count strong {
  color: var(--text);
  font-weight: 500;
}

.results-time {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-style: italic;
}

.table-wrap {
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  overflow: hidden;
  max-height: 520px;
  overflow-y: auto;
}

/* Custom scrollbar */
.table-wrap::-webkit-scrollbar {
  width: 6px;
}

.table-wrap::-webkit-scrollbar-track {
  background: var(--surface);
}

.table-wrap::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.table-wrap::-webkit-scrollbar-thumb:hover {
  background: var(--text-muted);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.84rem;
}

thead {
  position: sticky;
  top: 0;
  z-index: 2;
}

thead th {
  text-align: left;
  padding: 10px 16px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  background: var(--surface-raised);
  border-bottom: 1px solid var(--border-subtle);
}

tbody tr {
  border-bottom: 1px solid var(--border-subtle);
  transition: background 0.15s ease;
}

tbody tr:last-child { border-bottom: none; }

tbody tr:hover {
  background: var(--surface-hover);
}

tbody td {
  padding: 10px 16px;
  color: var(--text-secondary);
}

tbody td:first-child {
  color: var(--text);
  font-weight: 400;
}

.rating-cell {
  display: flex;
  align-items: center;
  gap: 6px;
}

.rating-bar {
  width: 40px;
  height: 3px;
  background: var(--surface-raised);
  border-radius: 2px;
  overflow: hidden;
}

.rating-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
}

.genre-tag {
  display: inline-block;
  padding: 2px 7px;
  font-size: 0.72rem;
  border-radius: 4px;
  background: var(--surface-raised);
  border: 1px solid var(--border-subtle);
  color: var(--text-muted);
  margin: 1px 2px;
}

.empty-state {
  padding: 48px 24px;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.87rem;
}

.empty-state svg {
  width: 32px;
  height: 32px;
  margin-bottom: 12px;
  opacity: 0.3;
}

/* Loading spinner */
.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Fade-in animation */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.card { animation: fadeUp 0.5s ease both; }
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.1s; }
.row-2 .card:nth-child(1) { animation-delay: 0.05s; }
.row-2 .card:nth-child(2) { animation-delay: 0.12s; }
main > .card:last-child { animation-delay: 0.18s; }

/* Error toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  z-index: 100;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  max-width: 400px;
}

.toast.visible {
  transform: translateY(0);
  opacity: 1;
}

.toast-error {
  background: rgba(239, 68, 68, 0.12);
  border: 1px solid rgba(239, 68, 68, 0.2);
  color: var(--error);
}

.toast-success {
  background: rgba(34, 197, 94, 0.1);
  border: 1px solid rgba(34, 197, 94, 0.2);
  color: var(--success);
}
</style>
</head>
<body>

<div class="ambient-glow"></div>

<div class="shell">
  <header>
    <h1>Movie <span>Database</span></h1>
    <div class="health-badge" id="healthBadge" data-status="checking">
      <div class="health-dot"></div>
      <span id="healthText">Checking...</span>
    </div>
  </header>

  <main>
    <div class="row-2">
      <!-- Upload -->
      <div class="card">
        <div class="card-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Dataset
        </div>
        <div class="drop-zone" id="dropZone">
          <div class="drop-zone-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <p>Drop a <strong>.csv</strong> file here or click to browse</p>
          <p style="font-size:0.75rem;color:var(--text-muted);margin-top:8px">
            Need test data? <a href="/sample-data" download="movies.csv" style="color:var(--accent-bright);text-decoration:none;border-bottom:1px solid var(--accent-glow-strong)" onclick="event.stopPropagation()">Download sample CSV</a> (367K movies, 16 MB)
          </p>
          <input type="file" id="fileInput" accept=".csv">
        </div>

        <div class="upload-status" id="uploadStatus">
          <div class="upload-file-name" id="fileName">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span></span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="status-text">
            <span class="tag" id="statusTag"></span>
            <span id="progressPercent"></span>
          </div>
        </div>
      </div>

      <!-- Download -->
      <div class="card">
        <div class="card-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </div>
        <div class="download-content">
          <div class="download-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </div>
          <p>Export the full dataset as a<br>gzip-compressed CSV file</p>
          <button class="btn btn-primary" id="downloadBtn" onclick="downloadDataset()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download .csv.gz
          </button>
        </div>
      </div>
    </div>

    <!-- Query -->
    <div class="card">
      <div class="card-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Query Movies
      </div>

      <form class="query-form" id="queryForm" onsubmit="queryMovies(event)">
        <div class="field">
          <label for="startYear">Start Year</label>
          <input type="number" id="startYear" placeholder="e.g. 2000" min="1800" max="2100">
        </div>
        <div class="field">
          <label for="endYear">End Year</label>
          <input type="number" id="endYear" placeholder="e.g. 2024" min="1800" max="2100">
        </div>
        <div class="field">
          <label for="genre">Genre</label>
          <input type="text" id="genre" placeholder="e.g. Action">
        </div>
        <button type="submit" class="btn btn-primary" id="queryBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Search
        </button>
      </form>

      <div class="results-bar" id="resultsBar" style="display:none">
        <span class="results-count" id="resultsCount"></span>
        <span class="results-time" id="resultsTime"></span>
      </div>

      <div id="resultsArea"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;

// ── Health Check ──────────────────────────────────────────
async function checkHealth() {
  const badge = document.getElementById('healthBadge');
  const text = document.getElementById('healthText');
  try {
    const r = await fetch(`${API}/health`);
    if (r.ok) {
      badge.dataset.status = 'ok';
      text.textContent = 'API Online';
    } else throw new Error();
  } catch {
    badge.dataset.status = 'error';
    text.textContent = 'API Offline';
  }
}
checkHealth();
setInterval(checkHealth, 15000);

// ── Upload ────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
});

async function handleFile(file) {
  if (!file.name.endsWith('.csv')) {
    showToast('Please select a .csv file', 'error');
    return;
  }

  const statusEl = document.getElementById('uploadStatus');
  const nameEl = document.getElementById('fileName').querySelector('span');
  const fill = document.getElementById('progressFill');
  const tag = document.getElementById('statusTag');
  const pct = document.getElementById('progressPercent');

  nameEl.textContent = file.name;
  fill.style.width = '0%';
  fill.className = 'progress-fill';
  tag.className = 'tag tag-pending';
  tag.textContent = 'Uploading';
  pct.textContent = '';
  statusEl.classList.add('active');

  const form = new FormData();
  form.append('file', file);

  try {
    const r = await fetch(`${API}/datasets`, { method: 'POST', body: form });
    if (!r.ok) throw new Error(`Upload failed: ${r.status}`);
    const { task_id } = await r.json();

    tag.className = 'tag tag-processing';
    tag.textContent = 'Processing';

    const es = new EventSource(`${API}/tasks/${task_id}/events`);
    es.onmessage = (evt) => {
      const data = JSON.parse(evt.data);
      fill.style.width = data.progress + '%';
      pct.textContent = data.progress + '%';

      if (data.status === 'processing') {
        tag.className = 'tag tag-processing';
        tag.textContent = 'Processing';
      }
      if (data.status === 'completed') {
        tag.className = 'tag tag-completed';
        tag.textContent = 'Completed';
        fill.classList.add('complete');
        es.close();
        showToast('Dataset ingested successfully', 'success');
      }
      if (data.status === 'error') {
        tag.className = 'tag tag-error';
        tag.textContent = 'Error';
        fill.classList.add('error');
        pct.textContent = data.error || 'Unknown error';
        es.close();
      }
    };
    es.onerror = () => {
      tag.className = 'tag tag-error';
      tag.textContent = 'Connection lost';
      es.close();
    };
  } catch (err) {
    tag.className = 'tag tag-error';
    tag.textContent = 'Error';
    pct.textContent = err.message;
    fill.classList.add('error');
  }
}

// ── Query ─────────────────────────────────────────────────
async function queryMovies(e) {
  e.preventDefault();
  const btn = document.getElementById('queryBtn');
  const area = document.getElementById('resultsArea');
  const bar = document.getElementById('resultsBar');

  const params = new URLSearchParams();
  const sy = document.getElementById('startYear').value;
  const ey = document.getElementById('endYear').value;
  const g = document.getElementById('genre').value.trim();
  if (sy) params.set('start_year', sy);
  if (ey) params.set('end_year', ey);
  if (g) params.set('genre', g);
  params.set('limit', '1000');

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Searching...';
  area.innerHTML = '';
  bar.style.display = 'none';

  const t0 = performance.now();
  try {
    const r = await fetch(`${API}/movies?${params}`);
    const elapsed = ((performance.now() - t0) / 1000).toFixed(3);

    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || `Error ${r.status}`);
    }

    const movies = await r.json();
    bar.style.display = 'flex';
    document.getElementById('resultsCount').innerHTML =
      `<strong>${movies.length.toLocaleString()}</strong> movie${movies.length !== 1 ? 's' : ''} found`;
    document.getElementById('resultsTime').textContent = `${elapsed}s`;

    if (movies.length === 0) {
      area.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 15h8M9 9h.01M15 9h.01"/></svg>
          <p>No movies match your query</p>
        </div>`;
    } else {
      const limit = Math.min(movies.length, 500);
      let rows = '';
      for (let i = 0; i < limit; i++) {
        const m = movies[i];
        const genres = m.genres
          ? m.genres.split(',').map(g => `<span class="genre-tag">${esc(g.trim())}</span>`).join(' ')
          : '—';
        const ratingVal = m.rating != null ? m.rating.toFixed(1) : '—';
        const ratingPct = m.rating != null ? (m.rating / 10 * 100) : 0;
        rows += `<tr>
          <td>${esc(m.movie_name)}</td>
          <td>${m.year ?? '—'}</td>
          <td>${genres}</td>
          <td><div class="rating-cell">
            <span>${ratingVal}</span>
            <div class="rating-bar"><div class="rating-bar-fill" style="width:${ratingPct}%"></div></div>
          </div></td>
        </tr>`;
      }

      area.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Title</th><th>Year</th><th>Genres</th><th>Rating</th></tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;

      if (movies.length > 500) {
        const note = document.createElement('p');
        note.style.cssText = 'font-size:0.75rem;color:var(--text-muted);text-align:center;margin-top:10px;';
        note.textContent = `Showing 500 of ${movies.length.toLocaleString()} results`;
        area.appendChild(note);
      }
    }
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Search`;
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Download ──────────────────────────────────────────────
async function downloadDataset() {
  const btn = document.getElementById('downloadBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Preparing...';
  try {
    const r = await fetch(`${API}/datasets/download`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || `Error ${r.status}`);
    }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'movies.csv.gz';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Download started', 'success');
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download .csv.gz`;
  }
}

// ── Toast ─────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'error') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast toast-${type} visible`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visible'), 4000);
}
</script>
